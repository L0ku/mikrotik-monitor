name: MikroTik VPN Monitor

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y expect telnet
          
      - name: Run Monitor
        run: |
          chmod +x monitor.sh
          ./monitor.sh
